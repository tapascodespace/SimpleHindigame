<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASE FILE // Voice Detective</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Rajdhani:wght@300;400;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1209;
    --paper: #f0e6c8;
    --paper-dark: #d4c49a;
    --sepia: #8b6914;
    --sepia-light: #c49a2a;
    --red: #c0392b;
    --red-dim: #7a1f14;
    --green: #2d6a2d;
    --smoke: rgba(26,18,9,0.85);
    --glow: 0 0 20px rgba(196,154,42,0.3);
  }

  html, body {
    height: 100%;
    background: var(--ink);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Rain overlay */
  #rain-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 2;
    opacity: 0.15;
  }

  /* ======= SETUP SCREEN ======= */
  #setup-screen {
    position: fixed; inset: 0;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    transition: opacity 0.8s ease;
  }

  .setup-card {
    background: var(--paper);
    border: 3px solid var(--sepia);
    border-radius: 2px;
    padding: 48px;
    max-width: 480px;
    width: 90%;
    position: relative;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.5), var(--glow);
  }

  .setup-card::before {
    content: 'CLASSIFIED';
    position: absolute;
    top: 16px; right: 16px;
    color: var(--red);
    font-family: 'Special Elite', serif;
    font-size: 11px;
    letter-spacing: 3px;
    border: 1px solid var(--red);
    padding: 2px 6px;
    transform: rotate(3deg);
  }

  .case-stamp {
    font-family: 'Special Elite', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--sepia);
    margin-bottom: 8px;
  }

  .setup-title {
    font-family: 'Special Elite', serif;
    font-size: 42px;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 6px;
  }

  .setup-sub {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    color: var(--sepia);
    margin-bottom: 32px;
    font-style: italic;
  }

  .input-label {
    font-family: 'Special Elite', serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--sepia);
    margin-bottom: 8px;
    display: block;
  }

  .api-input {
    width: 100%;
    background: var(--ink);
    border: 2px solid var(--sepia);
    color: var(--sepia-light);
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    padding: 12px 16px;
    outline: none;
    margin-bottom: 24px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .api-input:focus {
    border-color: var(--sepia-light);
    box-shadow: var(--glow);
  }

  .api-input::placeholder { color: #5a4a2a; }

  .start-btn {
    width: 100%;
    background: var(--ink);
    color: var(--sepia-light);
    border: 2px solid var(--sepia);
    font-family: 'Special Elite', serif;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .start-btn:hover {
    background: var(--sepia);
    color: var(--ink);
    box-shadow: var(--glow);
  }

  .start-btn:active { transform: translateY(1px); }

  .setup-hint {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    color: #8a7040;
    margin-top: 16px;
    text-align: center;
    line-height: 1.6;
  }

  /* ======= MAIN GAME ======= */
  #game-screen {
    display: none;
    height: 100vh;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 280px 1fr 240px;
    grid-template-areas:
      "header header header"
      "evidence story clues"
      "footer footer footer";
    gap: 0;
  }

  #game-screen.active {
    display: grid;
  }

  /* HEADER */
  .game-header {
    grid-area: header;
    background: var(--ink);
    border-bottom: 2px solid var(--sepia);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: relative;
    z-index: 10;
  }

  .header-title {
    font-family: 'Special Elite', serif;
    color: var(--sepia-light);
    font-size: 20px;
    letter-spacing: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse-red 2s ease-in-out infinite;
  }

  @keyframes pulse-red {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(192,57,43,0.6); }
    50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(192,57,43,0); }
  }

  .header-case {
    font-family: 'Courier Prime', monospace;
    color: var(--sepia);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .header-lang {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: var(--green);
    letter-spacing: 2px;
    border: 1px solid var(--green);
    padding: 3px 10px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .journal-btn {
    background: transparent;
    color: var(--sepia-light);
    border: 1px solid var(--sepia);
    font-family: 'Special Elite', serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .journal-btn:hover {
    border-color: var(--sepia-light);
    box-shadow: var(--glow);
  }

  /* EVIDENCE PANEL */
  .evidence-panel {
    grid-area: evidence;
    background: #120d06;
    border-right: 2px solid var(--sepia);
    padding: 24px 20px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--sepia) transparent;
  }

  .panel-header {
    font-family: 'Special Elite', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--sepia);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #2a1f0a;
  }

  .evidence-item {
    background: #1a1209;
    border: 1px solid #2a1f0a;
    border-left: 3px solid var(--sepia);
    padding: 12px;
    margin-bottom: 12px;
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    color: #a0845a;
    line-height: 1.6;
    animation: slide-in 0.4s ease;
  }

  .evidence-item.new { border-left-color: var(--sepia-light); color: var(--paper-dark); }

  .evidence-tag {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--sepia);
    margin-bottom: 4px;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* STORY PANEL */
  .story-panel {
    grid-area: story;
    background: #0e0a04;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .story-scene {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--sepia) transparent;
  }

  .scene-entry {
    margin-bottom: 28px;
    animation: fade-up 0.5s ease;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scene-role {
    font-family: 'Special Elite', serif;
    font-size: 11px;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .scene-role.detective { color: var(--sepia-light); }
  .scene-role.player { color: var(--green); }
  .scene-role.system { color: var(--red); }

  .scene-text {
    font-family: 'Courier Prime', monospace;
    font-size: 14px;
    line-height: 1.9;
    color: var(--paper-dark);
    max-width: 680px;
  }

  .scene-text.hindi {
    color: #7ab87a;
    font-style: italic;
    font-size: 13px;
  }

  /* Typewriter cursor */
  .typing-cursor::after {
    content: '█';
    animation: blink 0.8s step-end infinite;
    color: var(--sepia-light);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Speaking waveform */
  .wave-container {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 16px 32px;
    background: #0e0a04;
    border-top: 1px solid #1a1209;
  }

  .wave-container.active { display: flex; }

  .wave-bar {
    width: 3px;
    background: var(--sepia-light);
    border-radius: 2px;
    animation: wave-anim 0.8s ease-in-out infinite;
  }

  @keyframes wave-anim {
    0%, 100% { height: 4px; opacity: 0.4; }
    50% { height: 28px; opacity: 1; }
  }

  /* CLUES PANEL */
  .clues-panel {
    grid-area: clues;
    background: #120d06;
    border-left: 2px solid var(--sepia);
    padding: 24px 20px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--sepia) transparent;
  }

  .suspect-card {
    background: #1a1209;
    border: 1px solid #2a1f0a;
    padding: 12px;
    margin-bottom: 12px;
    animation: slide-in 0.4s ease;
  }

  .suspect-name {
    font-family: 'Special Elite', serif;
    font-size: 13px;
    color: var(--paper-dark);
    margin-bottom: 4px;
  }

  .suspect-status {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .suspect-status.clear { color: var(--green); }
  .suspect-status.suspect { color: var(--sepia-light); }
  .suspect-status.guilty { color: var(--red); }

  .guilt-bar {
    height: 2px;
    background: #2a1f0a;
    margin-top: 8px;
    overflow: hidden;
  }

  .guilt-fill {
    height: 100%;
    background: var(--sepia-light);
    transition: width 1s ease;
  }

  .guilt-fill.high { background: var(--red); }

  /* FOOTER — Voice Control */
  .game-footer {
    grid-area: footer;
    background: var(--ink);
    border-top: 2px solid var(--sepia);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 80px;
  }

  .voice-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #1a1209;
    border: 2px solid var(--sepia);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    position: relative;
  }

  .voice-btn:hover { border-color: var(--sepia-light); box-shadow: var(--glow); }

  .voice-btn.recording {
    border-color: var(--red);
    background: rgba(192,57,43,0.15);
    animation: recording-pulse 1s ease-in-out infinite;
  }

  @keyframes recording-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(192,57,43,0); }
  }

  .mic-icon {
    width: 20px; height: 20px;
    color: var(--sepia-light);
  }

  .voice-btn.recording .mic-icon { color: var(--red); }

  .voice-status {
    flex: 1;
  }

  .voice-status-label {
    font-family: 'Special Elite', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--sepia);
    margin-bottom: 4px;
  }

  .voice-transcript {
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    color: #7ab87a;
    min-height: 20px;
    font-style: italic;
  }

  .voice-transcript.error { color: var(--red); }

  .voice-hint {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    color: #4a3820;
    text-align: right;
    line-height: 1.6;
  }

  /* ======= LOADING / THINKING ======= */
  .thinking-dots span {
    animation: thinking 1.2s ease-in-out infinite;
    display: inline-block;
    color: var(--sepia-light);
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thinking {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ======= OVERLAY / WIN ======= */
  #outcome-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,7,2,0.95);
    z-index: 600;
    align-items: center;
    justify-content: center;
  }

  #outcome-overlay.active { display: flex; }

  .outcome-card {
    text-align: center;
    padding: 60px;
    border: 3px solid var(--sepia);
    background: #0e0a04;
    max-width: 480px;
    box-shadow: var(--glow);
  }

  .outcome-title {
    font-family: 'Special Elite', serif;
    font-size: 48px;
    color: var(--sepia-light);
    letter-spacing: 6px;
    margin-bottom: 12px;
  }

  .outcome-sub {
    font-family: 'Courier Prime', monospace;
    font-size: 14px;
    color: var(--paper-dark);
    line-height: 1.9;
    margin-bottom: 32px;
  }

  .play-again-btn {
    background: transparent;
    color: var(--sepia-light);
    border: 2px solid var(--sepia);
    font-family: 'Special Elite', serif;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 12px 32px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .play-again-btn:hover {
    background: var(--sepia);
    color: var(--ink);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--sepia); }

  /* Mobile */
  @media (max-width: 768px) {
    #game-screen.active {
      grid-template-columns: 1fr;
      grid-template-rows: 60px 1fr auto 80px;
      grid-template-areas: "header" "story" "clues" "footer";
    }
    .evidence-panel { display: none; }
    .clues-panel { max-height: 180px; }
  }

/* SUPERCELL STYLE CSS */
:root {
  --super-gold: linear-gradient(180deg, #FFE066 0%, #F5B000 100%);
  --super-blue: #1B75BC;
  --super-red: #E74C3C;
  --super-bg: #2C3E50;
  --card-shadow: 0 12px 24px rgba(0,0,0,0.5);
  --thick-border: 4px solid #111;
  --primary-theme: var(--super-blue);
}

.game-card { width: 100%; max-width: 420px; background: var(--super-bg); border-radius: 24px; box-shadow: var(--card-shadow); border: var(--thick-border); overflow: hidden; margin: 20px auto; position: relative; display: flex; flex-direction: column; font-family: 'Arial', sans-serif; transition: box-shadow 0.3s ease; }
.card-header { background: var(--super-gold); padding: 16px; text-align: center; border-bottom: var(--thick-border); }
.card-header h1 { margin: 0; font-size: 22px; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; letter-spacing: 2px; font-weight: 900; }
.card-stage { flex: 1; background: radial-gradient(circle at center, #3A536B 0%, #1A252F 100%); padding: 30px 20px; display: flex; flex-direction: column; align-items: center; position: relative; min-height: 250px; }
.enemy-sprite { width: 120px; height: 120px; object-fit: contain; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.6)); z-index: 2; transition: transform 0.2s ease; }
.enemy-name { margin-top: 50px; color: #fff; font-weight: bold; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; text-shadow: 1px 1px 2px #000; }
.health-ring-container { position: absolute; top: 130px; z-index: 3; width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; background: #111; border-radius: 50%; border: 3px solid #000; }
.health-ring { transform: rotate(-90deg); }
.health-ring-bg { fill: none; stroke: #333; stroke-width: 8; }
.health-ring-fill { fill: none; stroke: #4CAF50; stroke-width: 8; stroke-dasharray: 213; stroke-dashoffset: 0; transition: stroke-dashoffset 0.5s ease-out, stroke 0.3s; }
.health-text { position: absolute; color: #fff; font-weight: 900; font-size: 20px; text-shadow: 1px 1px 0 #000; }
.emote-bubble { position: absolute; top: 20px; right: 50px; background: #fff; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 3px solid #111; z-index: 4; box-shadow: 0 4px 8px rgba(0,0,0,0.3); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.card-dialogue { background: var(--super-bg); padding: 10px 20px; display: flex; justify-content: center; position: relative; z-index: 5; margin-top: -20px; }
.speech-bubble { background: #fff; border: var(--thick-border); border-radius: 16px; padding: 16px; width: 100%; text-align: center; position: relative; box-shadow: 0 8px 0 rgba(0,0,0,0.1); }
.speech-bubble::before { content: ''; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); border-width: 0 14px 14px 14px; border-style: solid; border-color: transparent transparent #111 transparent; }
.speech-bubble::after { content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); border-width: 0 10px 10px 10px; border-style: solid; border-color: transparent transparent #fff transparent; }
.hindi-text { font-size: 20px; font-weight: 900; color: #111; margin-bottom: 6px; }
.english-translation { font-size: 14px; font-weight: bold; color: #666; }
.card-action-bar { background: #111; padding: 20px; display: flex; align-items: center; gap: 16px; border-top: var(--thick-border); }
.voice-btn { width: 64px; height: 64px; border-radius: 50%; background: var(--primary-theme); border: 4px solid #fff; box-shadow: 0 6px 0px rgba(0,0,0,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, box-shadow 0.1s, background 0.3s; color: #fff; }
.voice-btn:active { transform: translateY(6px); box-shadow: 0 0px 0px rgba(0,0,0,0.5); }
.voice-btn.recording { background: var(--super-red) !important; animation: pulseMic 1s infinite alternate; }
.mic-icon { width: 32px; height: 32px; }
.action-status { flex: 1; }
.status-label { color: var(--primary-theme); font-weight: 900; font-size: 16px; text-transform: uppercase; margin-bottom: 4px; }
.status-transcript { color: #fff; font-size: 14px; min-height: 20px; }
@keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
@keyframes bounceIn { 0% { transform: scale(0.1); opacity: 0; } 60% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); } }
@keyframes bounceEnemy { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
@keyframes flashBg { 0%, 100% { background: radial-gradient(circle at center, #3A536B 0%, #1A252F 100%); } 50% { background: radial-gradient(circle at center, #fff 0%, #E74C3C 100%); } }
@keyframes pulseMic { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 100% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); } }
@keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
.anim-shake { animation: shake 0.5s; }
.anim-bounce { animation: bounceEnemy 0.5s; }
.anim-flash { animation: flashBg 0.3s; }
.anim-bounceIn { animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
</style>

</head>
<body>

<canvas id="rain-canvas"></canvas>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="case-stamp">DETECTIVE AGENCY // CASE FILE</div>
    <div class="setup-title">VOICE<br>DETECTIVE</div>
    <div class="setup-sub">Speak in Hindi. Unravel the mystery.</div>

    <button class="start-btn" onclick="startGame()">▶ OPEN CASE FILE</button>
    <div class="setup-hint">
      Keys are preloaded from local configuration.<br>
      Speak in <strong>Hindi or English</strong> — the detective responds in English.
    </div>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen">
  <!-- Supercell-Style Game Card -->
  <div class="game-card" id="game-card">
    
    <!-- Crown / Header -->
    <header class="card-header" id="card-header">
      <h1 id="level-title">LEVEL 1: THE ARENA</h1>
    </header>

    <!-- Stage Area -->

function initRain() {
  const canvas = document.getElementById('rain-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const drops = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    speed: 4 + Math.random() * 6,
    length: 12 + Math.random() * 20,
    opacity: 0.2 + Math.random() * 0.5,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#c49a2a';
    drops.forEach(d => {
      ctx.globalAlpha = d.opacity;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - 1, d.y + d.length);
      ctx.stroke();
      d.y += d.speed;
      if (d.y > canvas.height) { d.y = -d.length; d.x = Math.random() * canvas.width; }
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}

async function callClaude(systemPrompt, messages, maxTokens = 300) {

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': CLAUDE_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages
    })
  });

  if (!response.ok) throw new Error(`Claude API error: ${response.status}`);
  const data = await response.json();
  return data.content?.[0]?.text || '';
}

async function askClaude(englishIntent, rawInput, inputLanguage) {
  conversationHistory.push({
    role: 'user',
    content: `[Input language: ${inputLanguage}] Raw: ${rawInput}\nIntent in English: ${englishIntent}`
  });

  const reply = await callClaude(CASE_SCENARIO, conversationHistory, 320);
  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

async function translateToEnglish(rawText, sourceLanguage) {
  const translationSystem = `You are a precise translator for a voice game assistant.
Translate user speech into clear natural English while preserving intent.
Do not add extra interpretation, roleplay, or formatting.
Return only the translated English sentence.`;

  const translated  = await callClaude(translationSystem, [{
    role: 'user',
    content: `Source language: ${sourceLanguage}\nText: ${rawText}`
  }], 120);

  return translated.trim();
}

// ============================================================
//  ELEVENLABS TTS
// ============================================================
async function speakText(text) {
  const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
    method: 'POST',
    headers: {
      'xi-api-key': EL_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      text: text,
      model_id: 'eleven_multilingual_v2',
      voice_settings: {
        stability: 0.65,
        similarity_boost: 0.85,
        style: 0.3,
        use_speaker_boost: true
      }
    })
  });

  if (!response.ok) throw new Error(`ElevenLabs error: ${response.status}`);
  const blob = await response.blob();
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);

  return new Promise((resolve) => {
    const wave = document.getElementById('wave-container');
    wave.classList.add('active');
    audio.play();
    audio.onended = () => {
      wave.classList.remove('active');
      URL.revokeObjectURL(url);
      resolve();
    };
    audio.onerror = () => { wave.classList.remove('active'); resolve(); };
  });
}

    await speakText(opening);
    await promptLanguageChoice();
  } catch(e) {
    console.error('TTS error:', e);
    addToScene('system', '⚠ Voice playback failed. Check your ElevenLabs key.');
  }
}

async function promptLanguageChoice() {
  awaitingLanguageChoice = true;
  if (recognition) recognition.lang = 'en-IN';
  document.getElementById('voice-label').textContent = '// LANGUAGE CHECK: ENGLISH OR HINDI';
  document.getElementById('voice-transcript').textContent = 'Say: English or Hindi';
  const prompt = 'Do you want to respond in English or Hindi? Say English or Hindi.';
  addToScene('system', prompt);
  await speakText(prompt);
}

// ============================================================
//  SPEECH RECOGNITION (Hindi)
// ============================================================
function initRecognition() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    document.getElementById('voice-transcript').textContent = 'Speech recognition not supported. Use Chrome.';
    document.getElementById('voice-transcript').classList.add('error');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'hi-IN';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    document.getElementById('voice-label').textContent = '// LISTENING...';
    document.getElementById('voice-transcript').textContent = '...';
  };

  recognition.onresult = (event) => {
    const result = event.results[event.results.length - 1];
    const transcript = result[0].transcript;
    document.getElementById('voice-transcript').textContent = transcript;
    if (result.isFinal) {
      handleRecognizedSpeech(transcript);
    }
  };

  recognition.onerror = (event) => {
    console.error('Recognition error:', event.error);
    document.getElementById('voice-transcript').textContent = 
      event.error === 'no-speech' ? 'No speech detected. Try again.' : `Error: ${event.error}`;
    document.getElementById('voice-transcript').classList.add('error');
    stopRecording();
  };

  recognition.onend = () => {
    stopRecording();
  };
}

function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  if (!recognition) return;
  isRecording = true;
  document.getElementById('voice-btn').classList.add('recording');
  const modeLabel = awaitingLanguageChoice
    ? '// LISTENING: LANGUAGE CHOICE'
    : `// LISTENING IN ${preferredInputLanguage.toUpperCase()}...`;
  document.getElementById('voice-label').textContent = modeLabel;
  document.getElementById('voice-transcript').classList.remove('error');
  document.getElementById('voice-transcript').textContent = awaitingLanguageChoice
    ? 'English or Hindi?'
    : (preferredInputLanguage === 'hindi' ? 'बोलिए...' : 'Speak now...');
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  document.getElementById('voice-btn').classList.remove('recording');
  if (awaitingLanguageChoice) {
    document.getElementById('voice-label').textContent = '// WAITING FOR LANGUAGE CHOICE';
  } else {
    document.getElementById('voice-label').textContent = '// READY TO LISTEN';
  }
  if (recognition) { try { recognition.stop(); } catch(e) {} }
}

function setRecognitionLanguage(lang) {
  if (!recognition) return;
  recognition.lang = lang === 'english' ? 'en-US' : 'hi-IN';
}

function detectLanguageChoice(text) {
  const normalized = text.toLowerCase();
  const wantsEnglish = /english|inglish|अंग्रेज|इंग्लिश/.test(normalized);
  const wantsHindi = /hindi|hindee|हिंदी|हिन्दी/.test(normalized);
  if (wantsEnglish) return 'english';
  if (wantsHindi) return 'hindi';
  return null;
}

function isLikelyHindi(text) {
  return /[\u0900-\u097F]/.test(text);
}

async function handleRecognizedSpeech(transcript) {
  if (awaitingLanguageChoice) {
    const selected = detectLanguageChoice(transcript);
    if (!selected) {
      addToScene('system', 'Could not detect language choice. Please say English or Hindi.');
      document.getElementById('voice-label').textContent = '// SAY: ENGLISH OR HINDI';
      document.getElementById('voice-transcript').textContent = 'Please say English or Hindi';
      return;
    }

    preferredInputLanguage = selected;
    awaitingLanguageChoice = false;
    setRecognitionLanguage(selected);
    document.getElementById('header-lang').textContent = `INPUT: ${selected.toUpperCase()}`;
    addToScene('system', `Language set to ${selected.toUpperCase()}. Give your command now.`);
    document.getElementById('voice-label').textContent = `// READY IN ${selected.toUpperCase()}`;
    document.getElementById('voice-transcript').textContent = selected === 'hindi' ? 'अब अपना आदेश दीजिए।' : 'Now give your command.';
    return;
  }

  await processPlayerInput(transcript, preferredInputLanguage);
}

// ============================================================
//  PROCESS INPUT → CLAUDE → TTS
// ============================================================
async function processPlayerInput(rawText, selectedLanguage) {
  if (!rawText.trim()) return;
  const effectiveLanguage = typeof isLikelyHindi === 'function' && isLikelyHindi(rawText) ? 'hindi' : selectedLanguage;

  if (typeof turnCount !== 'undefined') turnCount++;

  // Disable mic during processing
  const voiceBtn = document.getElementById('voice-btn');
  if (voiceBtn) voiceBtn.disabled = true;
  const voiceLabel = document.getElementById('voice-label');
  if (voiceLabel) voiceLabel.textContent = 'THINKING...';
  const voiceTranscript = document.getElementById('voice-transcript');
  if (voiceTranscript) voiceTranscript.textContent = '';
  
  const emoteEl = document.getElementById('emote-bubble');
  if (emoteEl) {
    emoteEl.style.display = 'flex';
    emoteEl.textContent = '🤔';
  }

  try {
    let englishIntent = rawText;
    if (effectiveLanguage === 'hindi' && typeof translateToEnglish === 'function') {
      englishIntent = await translateToEnglish(rawText, 'Hindi');
    }

    // Get JSON response
    const jsonStr = await askClaude(englishIntent, rawText, effectiveLanguage);
    let gameData;
    try {
      gameData = JSON.parse(jsonStr.substring(jsonStr.indexOf('{'), jsonStr.lastIndexOf('}') + 1));
    } catch(e) {
      console.error("Failed to parse JSON", jsonStr);
      // Fallback
      gameData = {
         header: "THE INVESTIGATION",
         hindi_text: "",
         english_translation: jsonStr,
         ui_theme: { primary: "#1B75BC", animation: "bounceIn" },
         enemy: { name: "Suspect", health: 100, image_url: "https://ui-avatars.com/api/?name=Suspect&background=random&size=120" },
         visual_effect: "",
         emote: "surprised"
      };
    }

    // Apply JSON state to Supercell Card UI
    if (typeof renderGameState === 'function') {
      renderGameState(gameData);
    }

    // Speak the reply
    if (typeof speakText === 'function') {
      const speechOutput = (effectiveLanguage === 'hindi' && gameData.hindi_text) 
          ? gameData.hindi_text 
          : (gameData.english_translation || gameData.hindi_text);
      await speakText(speechOutput);
    }
    
    if (typeof promptLanguageChoice === 'function') {
      await promptLanguageChoice();
    }

  } catch (err) {
    if (voiceTranscript) voiceTranscript.textContent = `⚠ Error: ${err.message}`;
    console.error(err);
  }

  if (voiceBtn) voiceBtn.disabled = false;
  if (typeof awaitingLanguageChoice !== 'undefined' && !awaitingLanguageChoice && voiceLabel) {
    voiceLabel.textContent = 'TAP TO SPEAK';
  }
}

function updateSuspectsFromContext(reply, hindi) {
  const text = (reply + ' ' + hindi).toLowerCase();
  if (text.includes('hargreaves') || text.includes('colonel') || text.includes('colonel') || text.includes('कर्नल')) {
    updateSuspect('Hargreaves', 5);
  }
  if (text.includes('meera') || text.includes('मीरा')) {
    updateSuspect('Meera', 2);
  }
  if (text.includes('rajan') || text.includes('seth') || text.includes('राजन')) {
    updateSuspect('Seth', 3);
  }
}

// ============================================================
function showOutcome(title, text) {
  document.getElementById('outcome-title').textContent = title;
  document.getElementById('outcome-text').textContent = text;
  document.getElementById('outcome-overlay').classList.add('active');
  try { speakText(text); } catch(e) {}
}

function resetGame() {
  conversationHistory = [];
  turnCount = 0;
  evidenceCount = 1;
  awaitingLanguageChoice = false;
  preferredInputLanguage = 'hindi';
  SUSPECTS.forEach(s => { s.guilt = 0; s.status = 'suspect'; });

  document.getElementById('story-scene').innerHTML = '';
  document.getElementById('evidence-list').innerHTML = `
    <div class="evidence-item new">
      <div class="evidence-tag">EXHIBIT A</div>
      A jeweled pendant — the Star of Jaipur — has vanished from the Maharaja's locked vault.
    </div>
  `;
  document.getElementById('outcome-overlay').classList.remove('active');
  document.getElementById('header-lang').textContent = 'INPUT: HINDI';
  renderSuspects();
  logJournal({ kind: 'scene', role: 'system', text: '--- NEW CASE STARTED ---', at: new Date().toISOString(), turn: 0 });
  openingMonologue();
}

//  KEYBOARD SHORTCUT
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && document.getElementById('game-screen').classList.contains('active')) {
    e.preventDefault();
    if (!document.getElementById('voice-btn').disabled) toggleRecording();
  }
});

//  INIT
// ============================================================
initRain();
initWave();

function renderGameState(gameData) {
  if (gameData.ui_theme && gameData.ui_theme.primary) {
    document.documentElement.style.setProperty('--primary-theme', gameData.ui_theme.primary);
    document.getElementById('voice-btn').style.backgroundColor = 'var(--primary-theme)';
    document.getElementById('voice-label').style.color = 'var(--primary-theme)';
  }
  if (gameData.header) document.getElementById('level-title').textContent = gameData.header;
  if (gameData.hindi_text) document.getElementById('hindi-text').textContent = gameData.hindi_text;
  if (gameData.english_translation) document.getElementById('english-text').textContent = gameData.english_translation;
  if (gameData.enemy) {
    if (gameData.enemy.name) document.getElementById('enemy-name').textContent = gameData.enemy.name;
    if (gameData.enemy.image_url && gameData.enemy.image_url !== 'placeholder.png') {
      document.getElementById('enemy-image').src = gameData.enemy.image_url;
    }
    updateHealthBar(gameData.enemy.health || 0);
  }
  const emoteEl = document.getElementById('emote-bubble');
  if (gameData.emote) {
    const emoteMap = { 'angry': '💢', 'happy': '✨', 'sad': '💧', 'surprised': '❗', 'thinking': '🤔' };
    emoteEl.textContent = emoteMap[gameData.emote.toLowerCase()] || '💬';
    emoteEl.style.display = 'flex';
    emoteEl.style.animation = 'none';
    void emoteEl.offsetWidth; 
    emoteEl.style.animation = 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
  } else {
    emoteEl.style.display = 'none';
  }
  if (gameData.ui_theme && gameData.ui_theme.animation) animateCard(gameData.ui_theme.animation);
  if (gameData.visual_effect) triggerVisualEffect(gameData.visual_effect);
}

function updateHealthBar(newHealth) {
  const healthFill = document.getElementById('health-fill');
  const healthText = document.getElementById('health-text');
  if (!healthFill || !healthText) return;
  const clampedHealth = Math.max(0, Math.min(100, newHealth));
  healthText.textContent = clampedHealth;
  const offset = 213 - (213 * clampedHealth) / 100;
  healthFill.style.strokeDashoffset = offset;
  if (clampedHealth > 50) healthFill.style.stroke = '#4CAF50';
  else if (clampedHealth > 20) healthFill.style.stroke = '#FF9800';
  else healthFill.style.stroke = '#F44336';
}

function triggerVisualEffect(effect) {
  const stage = document.getElementById('card-stage');
  const card = document.getElementById('game-card');
  const enemy = document.getElementById('enemy-image');
  if(!stage || !card || !enemy) return;
  card.classList.remove('anim-shake');
  enemy.classList.remove('anim-bounce');
  stage.classList.remove('anim-flash');
  void card.offsetWidth;
  if (effect === 'shake') card.classList.add('anim-shake');
  else if (effect === 'bounce') enemy.classList.add('anim-bounce');
  else if (effect === 'flash') stage.classList.add('anim-flash');
  else if (effect === 'confetti') createConfettiEffect();
}

function animateCard(animationName) {
  const card = document.getElementById('game-card');
  if(!card) return;
  card.style.animation = 'none';
  void card.offsetWidth;
  if (animationName === 'bounceIn') card.classList.add('anim-bounceIn');
}

function createConfettiEffect() {
  const container = document.getElementById('card-stage');
  if(!container) return;
  const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d'];
  for (let i = 0; i < 30; i++) {
    const confetti = document.createElement('div');
    confetti.style.position = 'absolute';
    confetti.style.width = '8px';
    confetti.style.height = '8px';
    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.top = '-10px';
    confetti.style.zIndex = '10';
    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    container.appendChild(confetti);
    const animationTarget = (Math.random() * 200) + 50;
    const duration = (Math.random() * 1) + 0.5;
    confetti.animate([
      { transform: `translate3d(0,0,0) rotate(0)` },
      { transform: `translate3d(${Math.random() * 50 - 25}px, ${animationTarget}px, 0) rotate(${Math.random() * 360}deg)` }
    ], { duration: duration * 1000, easing: 'cubic-bezier(.37,0,.63,1)', fill: 'forwards' });
    setTimeout(() => { confetti.remove(); }, duration * 1000);
  }
}
